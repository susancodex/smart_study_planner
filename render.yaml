services:
  - type: web
    name: smart-study-planner
    env: docker
    repo: https://github.com/susancodex/smart_study_planner.git
    branch: main
    dockerfilePath: Dockerfile
    autoDeploy: true
    plan: free
    envVars:
      - key: DJANGO_SECRET_KEY
        value: REPLACE_WITH_SECRET
      - key: DJANGO_DEBUG
        value: 'False'
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        value: ''
    buildCommand: null
    startCommand: null
